<div class="surface-card p-5">
  <h3 class="text-sm font-semibold uppercase tracking-wider mb-4 text-muted">
    Loan Distribution
  </h3>
  <div class="flex flex-col md:flex-col md:items-center items-start gap-6">
    <div class="relative w-[180px] h-[180px] shrink-0">
      <canvas
        baseChart
        [data]="chartData()"
        [type]="'doughnut'"
        [options]="chartOptions()"
      ></canvas>
      <div
        class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none"
      >
        <span class="text-2xl font-bold">{{
          loanService.filteredLoans().length < 1 ? "0" : "100%"
        }}</span>
        <span class="text-xs" style="color: var(--text-muted)">4 types</span>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3 flex-1 w-full">
      @for (item of legendItems(); track item.label) {
        <div class="flex items-center gap-2">
          <span
            class="w-3 h-3 rounded-full flex-shrink-0"
            [style.background]="item.color"
          ></span>
          <div class="text-sm font-normal">
            {{ item.label }}
          </div>
          <div class="font-normal">{{ item.percentage }}%</div>
        </div>
      }
    </div>
  </div>
</div>
