<div class="surface-card px-5 pb-5">
  <h2 class="text-muted py-4 uppercase font-semibold">
    Confirm Dialog Preview
  </h2>
  <div class="surface-card p-5 shadow-none">
    <div class="flex items-start gap-3 mb-4">
      <div>
        <h2 class="text-lg font-semibold" style="color: var(--text-primary)">
          Delete loan record?
        </h2>
        <p class="text-sm mt-1">
          This will permanently remove
          <b>{{ selectedLoan.id }}</b> from the portfolio. This action cannot be
          undone.
        </p>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button
        mat-stroked-button
        class="px-4 py-2 text-sm font-normal transition-all border rounded-[8px]"
        aria-label="Cancel delete"
        (click)="dialogRef.close(); loanService.clearSelectedLoan()"
      >
        Cancel
      </button>
      <button
        mat-flat-button
        color="warn"
        class="px-4 py-2 text-sm font-normal border rounded-[8px]"
        aria-label="Confirm delete"
        (click)="
          loanService.deleteLoan(this.selectedLoan.id); dialogRef.close()
        "
      >
        Delete
      </button>
    </div>
  </div>
</div>
