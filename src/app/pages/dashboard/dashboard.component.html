<div class="min-h-screen dashboard-wrapper">
  <header class="sticky top-0 z-10 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-semibold">Loan Portfolio Dashboard</h1>
    </div>
    <app-theme-toggle></app-theme-toggle>
  </header>

  <main class="px-4 md:px-6 py-6 max-w-screen-2xl mx-auto">
    <section
      aria-label="Summary statistics"
      class="grid grid-cols lg:grid-cols-4 gap-4 mb-6"
    >
      @for (cardItem of summaryCards; track cardItem.label) {
        <app-summary-card [cardItem]="cardItem"></app-summary-card>
      }
    </section>

    <section class="grid grid-cols-1 xl:grid-cols-3 gap-6">
      <div class="xl:col-span-2">
        <app-loan-table></app-loan-table>
      </div>

      <div class="flex flex-col gap-6">
        <app-loan-chart></app-loan-chart>
        <!-- @if (!!loanService.selectedLoan()) {
          <app-confirm-dialog
            [selectedLoan]="loanService.selectedLoan()"
          ></app-confirm-dialog>
        } -->
      </div>
    </section>
  </main>
</div>
